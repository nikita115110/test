<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
    <meta charset="utf-8">
		<title></title>
		<link rel="stylesheet" type="text/css" href="login.css">
		<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>
<body>
	<div class="back"></div>
	<div class="fields"> 
		<form th:modelAttribute="userForm" th:object="${userForm}" method="post">
		    <div class="field">
		    	<label> User Name : 
		    		<input type="text" path="username" name="username" th:field="*{username}"/>
		    	</label>
		    </div>
		    <div class="field">
		    	<label> Password : 
		    		<input type="password" path="password"  th:field="*{password}"/>
		    	</label>
		    </div>
			<div class="field">
				<label> Password :
					<input type="password" path="passwordConfirm"  th:field="*{passwordConfirm}"/>
				</label>
			</div>
		    <div class="field">
		    	<input type="submit" value="Registration"/>
		    </div>
		</form>
	</div>
</body>
</html>
